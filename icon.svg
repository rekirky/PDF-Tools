<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">

<defs>
  <clipPath id="pdfClip2">
    <rect x="0" y="0" width="300" height="300" rx="60" ry="60"/>
  </clipPath>
</defs>

<rect x="0" y="0" width="300" height="300" rx="60" ry="60" fill="#7f1d1d"/>

