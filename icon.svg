  <line x1="44" y1="242" x2="28" y2="204" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>
  <circle cx="32" cy="268" r="11" fill="none" stroke="#e2e8f0" stroke-width="5"/>
